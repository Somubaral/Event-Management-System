{% extends "base.html" %}

{% block title %}
Create Event
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">
            Create Event
        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">
                    <label>Title</label>

                    <input
                        type="text"
                        name="title"
                        class="form-control"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label>Description</label>

                    <textarea
                        name="description"
                        class="form-control"
                    ></textarea>
                </div>

                <div class="mb-3">
                    <label>Venue</label>

                    <select
                        name="venue"
                        class="form-control"
                    >

                        {% for venue in venues %}

                        <option value="{{ venue.id }}">
                            {{ venue.name }}
                        </option>

                        {% endfor %}

                    </select>

                </div>

                <div class="mb-3">
                    <label>Start Time</label>

                    <input
                        type="datetime-local"
                        name="start_time"
                        class="form-control"
                        required
                    >
                </div>

                <div class="mb-3">
                    <label>End Time</label>

                    <input
                        type="datetime-local"
                        name="end_time"
                        class="form-control"
                        required
                    >
                </div>

                <button
                    class="btn btn-success"
                    type="submit"
                >
                    Create Event
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}

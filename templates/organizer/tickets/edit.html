{% extends "base.html" %}

{% block title %}
Edit Ticket Category
{% endblock %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header">
            Edit Ticket Category
        </div>

        <div class="card-body">

            <form method="post">

                {% csrf_token %}

                <div class="mb-3">

                    <label>
                        Category Name
                    </label>

                    <input
                        type="text"
                        name="name"
                        class="form-control"
                        value="{{ category.name }}"
                    >

                </div>

                <div class="mb-3">

                    <label>
                        Price
                    </label>

                    <input
                        type="number"
                        step="0.01"
                        name="price"
                        class="form-control"
                        value="{{ category.price }}"
                    >

                </div>

                <button
                    class="btn btn-primary"
                >
                    Update
                </button>

            </form>

        </div>

    </div>

</div>

{% endblock %}

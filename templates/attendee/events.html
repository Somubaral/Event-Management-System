{% extends "base.html" %}

{% block content %}

<h2 class="mb-4">
    Available Events
</h2>

<div class="row">

{% for event in events %}

```
<div class="col-md-4 mb-4">

    <div class="card shadow-sm card-hover h-100">

        <div class="card-body">

            <h5 class="card-title">
                {{ event.title }}
            </h5>

            <p class="card-text">
                {{ event.description }}
            </p>

            <p>
                <strong>
                    Venue:
                </strong>
                {{ event.venue.name }}
            </p>

            <a
                href="/event/{{ event.id }}/"
                class="btn btn-primary">

                View Details

            </a>

        </div>

    </div>

</div>
```

{% endfor %}

</div>

{% endblock %}
